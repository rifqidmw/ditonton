coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 5%
    patch:
      default:
        target: 70%

ignore:
  - "**/*.g.dart"
  - "**/*.freezed.dart"
  - "**/main.dart"
  - "test/**"
  - "integration_test/**"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
