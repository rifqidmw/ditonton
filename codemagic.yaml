workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter test
        script: |
          (cd core && flutter test --machine) 2>&1 | tee core_test.json
          (cd movies && flutter test --machine) 2>&1 | tee movies_test.json
          (cd tv_series && flutter test --machine) 2>&1 | tee tv_series_test.json
      - name: Flutter build iOS (simulator, no codesign)
        script: |
          flutter build ios --debug --simulator
    artifacts:
      - build/ios/iphoneos/Runner.app
      - flutter_drive.log
      - '*.json'
    publishing:
      email:
        recipients:
          - rifqi.dmw@gmail.com
        notify:
          success: true
          failure: true

  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter test
        script: |
          (cd core && flutter test --machine) 2>&1 | tee core_test.json
          (cd movies && flutter test --machine) 2>&1 | tee movies_test.json
          (cd tv_series && flutter test --machine) 2>&1 | tee tv_series_test.json
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
      - flutter_drive.log
      - '*.json'
    publishing:
      email:
        recipients:
          - rifqi.dmw@gmail.com
        notify:
          success: true
          failure: true
